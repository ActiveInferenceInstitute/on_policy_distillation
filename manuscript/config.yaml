paper:
  title: "On-Policy Distillation as Active Inference in Finite Variational Models"
  subtitle: "Reverse-KL free energy, student-induced sampling, and deterministic toy witnesses"
  version: "1.0.2"
  date: "June 2026"
  cover:
    image: output/figures/graphical_abstract.png
    alt: "Cover: on-policy distillation as active inference in finite variational models — executable classroom and sequential-shift witnesses, energy decomposition, and Lean-backed validation gates."

authors:
  - name: "Daniel Ari Friedman"
    orcid: "0000-0001-6232-9096"
    email: "daniel@activeinference.institute"
    affiliation: "Active Inference Institute"
    corresponding: true

publication:
  # Zenodo concept DOI (resolves to the latest version) + the current version DOI.
  doi: "10.5281/zenodo.20747834"
  version_doi: "10.5281/zenodo.20749817"
  version_record: "https://zenodo.org/records/20749817"
  github_repository: "ActiveInferenceInstitute/on_policy_distillation"
  transmission_bookends:
    enabled: true
    max_prior_releases: 5
    show_steganography: true

front_matter:
  graphical_abstract:
    enabled: true
    image: output/figures/graphical_abstract.png
    caption: "Graphical abstract: on-policy distillation as active inference in finite variational models, with executable classroom and sequential-shift witnesses, energy decomposition, and Lean-backed validation gates."
    width: "0.96\\textwidth"
    max_height: "0.58\\textheight"

keywords:
  - "on-policy distillation"
  - "active inference"
  - "self-distillation"
  - "privileged information"
  - "free energy principle"
  - "reverse KL divergence"
  - "pymdp"
  - "sophisticated inference"

metadata:
  license: "MIT"
  language: "en"
  # Dense, config-driven page margins with extra bottom clearance (single source of truth — do not also set
  # \geometry in preamble.md). Forwarded to pandoc as `-V geometry:` by
  # infrastructure/rendering/_pdf_combined_pandoc.py::build_pandoc_tex_command.
  geometry: "margin=0.5in,bottom=0.9in"

render:
  formats:
    pdf: true
    html: true
    slides: false

llm:
  reviews:
    enabled: false
  translations:
    enabled: false

testing:
  max_test_failures: 0

analysis:
  scripts:
    - compose_manuscript.py
    - run_analytical_sweep.py
    - simulate_si_tmaze.py
    - simulate_si_graph_world.py
    - compute_statistics.py
    - generate_firstprinciples.py
    - generate_validation_spine.py
    - generate_toy_sweep_tracks.py
    - generate_formal_interop_tracks.py
    - generate_integration_audit.py
    - generate_sheaf_tracks.py
    - generate_figures.py
    - render_animation.py
    - z_generate_manuscript_variables.py

sheaf:
  manifest: manuscript/sheaf/manifest.yaml
  registry: manuscript/sheaf/tracks.yaml
  coverage_config: manuscript/sheaf/coverage.yaml
  composer: scripts/compose_manuscript.py
  figures_config: figures.yaml
  # Row/section counts are registry-backed (structural_counts); do not hard-code here.
