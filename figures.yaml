      student's pre-correction test distribution. Right: evaluating the pre-correction
      student on teacher-forced states gives train loss {{sequential_train_loss:.3f}} nats,
      which underestimates its own induced test loss {{sequential_test_loss_before:.3f}}
      nats; the deterministic on-policy correction reduces the test loss to
      {{sequential_test_loss_after:.3f}} nats, closing {{sequential_gap_closed:.3f}} nats.
