# Visualization style for active_inference_on_policy_distillation figures.
# Loaded by src/visualizations/figure_style.py via apply_style().

dpi: 160
transparent: false
font_scale: 1.5
grid: true

palette:
  primary: "#111827"
  secondary: "#2563eb"
  accent: "#0f766e"
  grid: "#d4d4d8"
  muted: "#64748b"
  reference: "#52525b"
  pass: "#0f766e"
  fail: "#b91c1c"
  proved: "#dcfce7"
  sorry: "#fee2e2"
  panel_bg: "#f8fafc"
  header_bg: "#e2e8f0"

figures:
  ising_mi_curve:
    filename: ising_mi_curve.png
    alt: >-
      Two-panel plot of mutual information versus coupling strength lambda for the
      symmetric Bernoulli-Ising toy. Left panel shows the closed-form mutual-information
      curve with lambda on the x-axis and mutual information in nats on the y-axis. Right
      panel shows the independent exact recomputation only as recompute-minus-closed-form
      residuals versus lambda with a zero reference line; the two deterministic estimators
      agree to machine precision.
    caption: >-
      Mutual information between the two coupled spins as a function of coupling strength.
      Left: closed-form $I(\lambda)$ for the symmetric Bernoulli-Ising toy across
      {{param_sweep_grid_points}} grid points up to $\lambda_{\max}$ = {{lambda_max}},
      rising monotonically toward a grid maximum of {{ising_mi_saturation}} nats as the
      spins become maximally correlated. This is the minimal model of the teacher--student
      coupling that on-policy distillation must transmit: the analytic information content
      the student policy is asked to absorb from the teacher. Right: the independent exact
      recomputation via total correlation is shown as recompute-minus-closed-form residuals
      rather than as a second overplotted curve; because both estimators are deterministic
      (no sampling), the maximum residual of {{sweep_max_residual:.1e}} nats (machine
      precision) is a cross-implementation agreement check confirming the analytic
      information measure is reproducible to machine precision.
    width: 0.9
  free_energy_curve:
    filename: free_energy_curve.png
    alt: >-
      Two-panel free-energy gap figure. The left panel plots the exact entangled target
      free energy as a dashed zero line, the independent mean-field student gap as a rising
      solid curve, and mutual information as a dotted comparison curve. The right panel
      shows the lambda-max decomposition where the coupling-prior term cancels total
      correlation for the exact target while the mean-field gap remains positive.
    caption: >-
      Free-energy gap created by privileged teacher--student coupling across
      {{param_sweep_grid_points}} sweep points. The exact entangled target
      $p_\lambda$ gives $F(q_\lambda;p_\lambda)=0$ to numerical tolerance
      (max absolute value {{free_energy_exact_target_max_abs:.1e}} nats) because
      the posterior is evaluated against its own normalized target. The independent
      mean-field baseline $q_0$ instead pays
      $D_{\mathrm{KL}}(q_\lambda\|q_0)$, rising to
      {{free_energy_mean_field_gap_max:.3f}} nats; in this symmetric toy that gap
      equals mutual information $I(\lambda)$ up to
      {{free_energy_gap_equals_mi_max_abs:.1e}} nats. The right panel makes the
      cancellation explicit: the exact-target coupling-prior term and total-correlation
      gain cancel, while the mean-field student keeps the information gap that on-policy
      distillation is meant to close.
    width: 0.9
  distillation_divergence_geometry:
    filename: distillation_divergence_geometry.png
    alt: >-
      Two-panel source-backed divergence geometry figure. The left panel compares
      teacher and student categorical policy mass over four modes. The right panel
      shows reverse KL, forward KL, Jensen-Shannon, alpha-divergence, and clipped
      reverse KL values in nats, generated from the first-principles divergence
      artifact.
    caption: >-
      Divergence geometry for the teacher/student categorical toy. Left: teacher and
      student policy mass over four action modes for the fixed illustrative pair. Middle:
      the same teacher--student pair scored under five divergences -- reverse KL
      {{divergence_reverse_kl:.3f}} nats, forward KL {{divergence_forward_kl:.3f}} nats,
      Jensen-Shannon {{divergence_jensen_shannon:.3f}} nats, alpha-divergence
      {{divergence_alpha_0_5:.3f}} nats, and clipped reverse KL
      {{divergence_clipped_reverse_kl:.3f}} nats (all from
      `output/data/firstprinciples/divergence_demo.json`). Right: the entropy panel shows
      the student entropy exceeds the teacher entropy, so this fixed illustrative pair is
      mode-covering (the artifact's mode-seeking flag is false), illustrating objective
      geometry rather than asserting a universal KL outcome. The spread across measures
      shows that the choice of distillation objective is not neutral: forward KL, reverse
      KL, alpha divergence, and clipping weight support mismatch differently, and the
      realized behavior remains support- and optimization-dependent. Implementation
      convention: inputs are projected onto the probability simplex, KL uses
      $0\log 0 = 0$ and returns infinity on support violations rather than smoothing
      (no epsilon is added); the illustrative pair here has full support, so all values
      are finite and deterministic.
    width: 0.92
  exposure_bias_recovery:
    filename: exposure_bias_recovery.png
    alt: >-
      Line plot comparing a toy off-policy compounding-error curve with an
      on-policy correction curve across generated steps. The off-policy curve
      decays steadily while the on-policy curve approaches a stable fixed point,
      leaving a labeled terminal recovery gap.
    caption: >-
      Toy model of exposure bias and its on-policy remedy: expected correctness — the
      closed-form per-step probability that the student emits the teacher-correct token
      under the two-state drift model — over generated steps for an off-policy student
      (trained on teacher-visited states only) versus an on-policy student (corrected on
      its own rollouts). The off-policy curve decays as compounding errors push the student
      into states the teacher never demonstrated -- off-policy final correctness
      {{exposure_bias_off_policy_final:.3f}} -- while the on-policy curve stabilizes at
      {{exposure_bias_on_policy_final:.3f}}, leaving a terminal recovery gap of
      {{exposure_bias_terminal_gap:.3f}} (values from
      `output/data/firstprinciples/exposure_bias_demo.json`). Both curves are deterministic
      closed forms, so no uncertainty intervals apply. This is the motivating argument for
      on-policy distillation — with the caveat that the empirical severity of exposure bias
      is task-dependent — and mirrors active inference's insistence on evaluating beliefs
      along the agent's own visited trajectory rather than a fixed reference distribution.
    width: 0.9
  energy_decomposition:
    filename: energy_decomposition.png
    alt: >-
      Two-panel energy-based decomposition figure. The left panel shows the
      variational free energy split into complexity and accuracy bars with the
      net free energy; the right panel shows the expected free energy split into
      risk, ambiguity, epistemic, and pragmatic bars, generated from the
      first-principles energy artifact.
    caption: >-
      Energy-based decompositions for the categorical generative model, showing the two
      quantities active inference uses to score perception and action. Left: variational
      free energy split into complexity {{energy_complexity:.3f}} minus the accuracy
      term {{energy_accuracy:.3f}} nats (bounding log-evidence
      {{energy_log_evidence:.3f}}). Complexity is zero here because the evaluated
      student belief equals the prior, so $D_{\mathrm{KL}}(q\|p(s))=0$; the VFE is
      therefore the negative of the negative log-likelihood accuracy term, not an
      unexplained zero. Right:
      expected free energy split into risk {{efe_risk:.3f}} plus ambiguity
      {{efe_ambiguity:.3f}} nats, equivalently subtracting epistemic {{efe_epistemic:.3f}}
      and pragmatic {{efe_pragmatic:.3f}} value. Sign key: risk and ambiguity are
      penalties (positive bars worsen $G$), epistemic and pragmatic are values
      (positive bars improve $G$), under the exact identity
      $G = risk + ambiguity = -(epistemic + pragmatic)$ as decomposed in
      `output/data/firstprinciples/energy_demo.json`; all bars are deterministic
      closed-form evaluations in nats. Reading distillation through this
      lens, the complexity/accuracy and risk/ambiguity terms make explicit that an
      on-policy student is simultaneously matching the teacher's outputs (accuracy/pragmatic)
      and reducing its own uncertainty about unvisited states (epistemic).
    width: 0.95
  parallel_convergence:
    filename: parallel_convergence.png
    alt: >-
      Two-panel figure. Left: the reverse-KL on-policy-distillation loss versus gradient
      step on a logarithmic axis, decaying toward zero as a jax-autodiff student is trained.
      Right: grouped bars comparing the active-inference exact posterior with the
      machine-learning-distilled student over the hidden states; the bars coincide.
    caption: >-
      One scenario solved in two frameworks. A standard machine-learning loop (jax
      automatic differentiation on the reverse-KL distillation loss) drives a student
      policy to the active-inference exact posterior $p(s\mid o)$: the per-step reverse KL
      decays toward zero (left panel, logarithmic y-axis) and the distilled student matches
      the posterior to within {{parallel_max_abs_difference:.1e}} (right), its variational
      free energy reaching {{parallel_student_free_energy:.3f}} nats -- the evidence bound
      $-\ln p(o) = {{parallel_neg_log_evidence:.3f}}$. Optimization: full-batch gradient
      descent at learning rate {{parallel_opt_learning_rate}}, at most
      {{parallel_opt_max_steps}} steps with early stop at loss tolerance
      {{parallel_opt_stop_tolerance:.0e}}; the run is fully deterministic (no sampling), so
      no uncertainty intervals apply. The reverse-KL distillation gradient is the variational
      free-energy gradient, so the correspondence is executed rather than asserted.
      Source: `output/data/firstprinciples/parallel_demo.json`.
    width: 0.95
  diversity_tradeoff:
    filename: diversity_tradeoff.png
    alt: >-
      Line plot of sampling Pass-at-k versus student temperature on a logarithmic x-axis, with a
      dashed horizontal line for the temperature-invariant greedy Pass-at-1. Pass-at-k rises with
      temperature and collapses toward the greedy ceiling as the student sharpens.
    caption: >-
      The diversity-collapse tradeoff of mode-seeking distillation, evaluated over a problem
      ensemble. Greedy Pass-at-1 (dashed, {{diversity_greedy_pass_at_1:.3f}}) is
      temperature-invariant; sampling Pass-at-k falls from {{diversity_flattest_pass_at_k:.3f}}
      at the flattest temperature to {{diversity_sharpest_pass_at_k:.3f}} at the sharpest,
      because $Pass@k = 1-(1-p)^k$ for independent samples. Every curve is derived
      analytically from the declared temperature-sharpened ensemble (closed form, no
      sampling): this panel is an exact calculation over the toy problem ensemble, not an
      empirical measurement. Aggressive sharpening can raise single-answer commitment while
      lowering multi-sample coverage -- the Pass-at-1-versus-Pass-at-k tension active
      inference frames as precision (inverse temperature), adjacent to the broader
      generation literature on objective- and decoding-induced diversity loss.
      Source: `output/data/firstprinciples/diversity_demo.json`.
    width: 0.9
  privilege_dose_response:
    filename: privilege_dose_response.png
    alt: >-
      Two-panel dose-response figure from the deterministic classroom sweep over teacher cue
      validity. Left panel: belief-entropy gap (student minus teacher) is exactly zero through
      cue validity {{privilege_sweep_last_flat_validity}} and jumps at the highest level. Right
      panel: mean reverse-KL distillation signal on a logarithmic axis turns on earlier and
      grows by orders of magnitude.
    caption: >-
      Teacher-privilege dose-response over {{privilege_sweep_level_count}} cue-validity levels
      (student fixed at {{privilege_sweep_student_cue_validity}}; the identical-agent baseline gap
      {{privilege_sweep_baseline_gap:.1f}} is a wiring check, not an effect control). The
      belief-entropy advantage is strongly nonlinear: zero through cue validity
      {{privilege_sweep_last_flat_validity}}, {{privilege_sweep_top_gap:+.3f}} nats at
      {{privilege_sweep_top_validity}} (step-versus-slope is resolution-limited by the grid). The mean
      reverse-KL distillation signal is the more sensitive detector, rising from its first
      appreciable value ({{privilege_sweep_first_nonzero_kl:.3g}} nats above a 10^-3-nat noise
      floor) at cue validity {{privilege_sweep_first_nonzero_validity}} to
      {{privilege_sweep_top_kl:.3g}} nats —
      the loss the student would descend registers privilege that posterior-entropy summaries
      miss. Gap/validity rank correlation {{privilege_sweep_gap_rank_correlation:.2f}}.
      Source: `output/data/firstprinciples/privilege_sweep.json`.
    width: 0.95
  correspondence_map:
    filename: correspondence_map.png
    alt: >-
      Three-column dictionary figure mapping active inference constructs (left column) to
      on-policy distillation constructs (right column) through their shared formal object
      (center column), with bidirectional arrows on every row. All rows of the audited
      correspondence map are shown.
    caption: >-
      The audited correspondence dictionary, rendered in full: all
      {{correspondence_row_count}} machine-validated rows pairing an active inference
      construct (left) with its on-policy distillation counterpart (right) through the
      shared formal object both instantiate (center). This is the paper's thesis as a
      single picture: each row is a checked entry in
      `firstprinciples.mapping.CORRESPONDENCES` (no empty cells, unique keys), not a
      rhetorical analogy. The full table with per-row notes appears in the appendix.
      Source: `output/data/firstprinciples/correspondence_map.json`.
    width: 0.84
  policy_posterior_grid:
    filename: policy_posterior_grid.png
    alt: >-
      Three-panel figure of measured policy posteriors from the pymdp T-maze harness. The
      first two panels are step-by-action heatmaps of the marginal action posterior for the
      sophisticated-inference and vanilla planners; the third panel plots policy-posterior
      entropy in nats against rollout step for both planners.
    caption: >-
      The student's measured posterior over policies, step by step — the quantity the
      correspondence identifies with the distillation target. Left and center: marginal
      action posteriors per rollout step for both planners (cell values are probabilities;
      labels shown for mass at or above 0.30). Right: policy-posterior entropy by step for
      all {{posterior_grid_available_count}} of {{posterior_grid_row_count}} measured grid
      rows. Entropy collapses after the cue observation: the on-policy rollout is what
      exposes the agent to the observation that sharpens its own posterior, the T-maze
      version of the induced-distribution argument for on-policy distillation.
      Source: `output/data/pymdp_policy_posterior_grid.json`.
    width: 0.99
  opd_taxonomy_landscape:
    filename: opd_taxonomy_landscape.png
    alt: >-
      Timeline landscape of the audited distillation-method taxonomy. Methods appear as
      labeled points by publication year on the x-axis, arranged in four horizontal lanes by
      design quadrant: off-policy without privilege, off-policy with privileged signal,
      on-policy without privilege, and on-policy with privileged signal. Lane labels include
      the per-lane method counts derived from the taxonomy artifact.
    caption: >-
      The distillation literature as a design landscape: all {{opd_taxonomy_method_count}}
      audited taxonomy methods placed by publication year and by the two design axes the
      correspondence singles out — does the student generate its own training distribution
      (on-policy), and does the teacher condition on information the student cannot see
      (privilege)? Of the {{opd_taxonomy_method_count}} methods,
      {{opd_taxonomy_on_policy_count}} are on-policy and
      {{opd_taxonomy_privileged_info_count}} use privileged signal; the upper lane — both
      at once — is exactly the regime the active inference reading describes as a
      variational posterior generating its own observations under a generative model
      conditioned on privileged beliefs. Lane membership is read from the artifact, not
      hand-assigned; crowded lanes use a right-side label key, and remaining point labels
      use deterministic offsets, so horizontal position is approximate within one year.
      Source: `output/data/firstprinciples/opd_taxonomy.json`.
    width: 0.99
  si_tmaze_actions:
    filename: si_tmaze_actions.png
    alt: >-
      Two-panel plot for the canonical pymdp full TMaze sophisticated-inference rollout.
      Left panel shows selected action index by timestep; right panel shows marginal
      first-action probabilities from q-pi for all five location actions. The initial
      selected action is {{si_tmaze_initial_selected_action_name}} under SI search horizon
      {{si_tmaze_planning_horizon}}.
    caption: >-
      Canonical sophisticated-inference action selection for the full pymdp TMaze rollout
      (agent policy length {{si_tmaze_policy_len}}, SI search horizon
      {{si_tmaze_planning_horizon}}). Left: selected action index per timestep. Right:
      first-action marginals from the policy posterior over all five location actions. The
      initial selected action is {{si_tmaze_initial_selected_action_name}}, with cue-directed
      marginal probability {{si_tmaze_first_action_cue_probability:.3f}}. The policy-entropy
      drop after the cue is {{si_tmaze_policy_entropy_drop_after_cue_formatted}} nats,
      quantifying the information-seeking step an on-policy student must learn to reproduce.
    width: 0.9
  si_belief_entropy_curve:
    filename: si_belief_entropy_curve.png
    alt: >-
      Line plot of belief entropy in nats versus timestep for the pymdp T-maze rollout.
      Entropy ranges from {{si_entropy_min}} to {{si_entropy_max}} nats across
      {{si_tmaze_rollout_timestep_count}} rollout records under the canonical
      {{pymdp_planner}} planner.
    caption: >-
      Belief entropy in nats over the course of the pymdp T-maze rollout (mean
      {{si_tmaze_mean_belief_entropy_formatted}} nats; mean policy entropy
      {{si_tmaze_policy_entropy_mean_formatted}} nats), tracing how the agent's uncertainty
      changes once the cue is observed at timestep {{si_tmaze_cue_observed_step}} and before
      the reward/outcome appears at timestep {{si_tmaze_reward_observed_step}}. The entropy
      trace is the epistemic payoff of the cue action made quantitative.
    width: 0.9
  si_obs_action_trace:
    filename: si_obs_action_trace.png
    alt: >-
      Dual-panel plot of the full pymdp TMaze rollout. The upper panel overlays location,
      outcome, and cue observation modality indices; the lower panel shows the selected
      action index and action names. Goal reached flag is {{si_goal_reached}}.
    caption: >-
      Multimodal observation and action traces for the full TMaze rollout
      ({{si_tmaze_observation_modality_count}} observation modalities; action diversity
      {{si_action_diversity}}). Upper: location, outcome, and cue observation indices over
      time. Lower: the selected action index and names. Together the panels show the closed
      perception--action loop that produces the teacher's behavior: cue observation at
      timestep {{si_tmaze_cue_observed_step}}, reward/outcome observation at timestep
      {{si_tmaze_reward_observed_step}}, and cue-before-reward ordering
      {{si_tmaze_cue_before_reward}}. Capturing this joint observation--action structure,
      rather than a marginal action policy, is what makes the active-inference teacher
      faithfully reproducible.
    width: 0.9
  sheaf_coverage_heatmap:
    filename: sheaf_coverage_heatmap.png
    alt: >-
      Heatmap matrix of IMRAD manuscript rows versus {{sheaf_track_count}} sheaf
      fragment track columns. Black cells mean the track is bound and the fragment
      file exists; white cells mean the track is not bound; gray cells mean bound
      but missing. Rows are grouped by IMRAD block with indented subsection labels;
      column headers list track ids.
    caption: >-
      Sheaf track coverage matrix mapping {{imrad_manifest_rows}} IMRAD manuscript rows
      against {{sheaf_track_count}} composable fragment-track columns: black = present (P),
      white = absent (—), gray = bound-but-missing (M), with counts {{coverage_present}}
      present / {{coverage_bound}} bound / {{coverage_missing}} missing. The figure shows
      the science-bearing track subset; build-machinery columns are omitted and the full
      matrix appears in the supplement. The matrix is the gluing record showing which
      evidence fragment is locally attached to each manuscript section. Reading it as a
      sheaf condition, a consistent (fully present, zero-missing) column set is what
      licenses gluing the local toy results, Lean witnesses, and pymdp rollouts into one
      globally coherent active-inference argument about on-policy distillation.
    width: 0.95
  sheaf_layers_overview:
    filename: sheaf_layers_overview.png
    alt: >-
      Two-panel overview of sheaf fragment layers. Left panel shows
      {{sheaf_track_count}} composable track types in registry compose order with
      labels and renderer ids. Right panel shows the IMRAD section binding heatmap
      with black present, white absent, and gray missing cells across
      {{imrad_manifest_rows}} manifest rows and {{sheaf_track_count}} tracks.
    caption: >-
      Sheaf layers overview. Left: the registry stack of {{sheaf_track_count}} composable
      fragment types in compose order with their renderer ids, the ordered base over which
      the manuscript sheaf is assembled. Right: the IMRAD section-binding heatmap across
      {{imrad_manifest_rows}} manifest rows ({{coverage_present}} present / {{coverage_bound}}
      bound / {{coverage_missing}} missing). Together the panels show how heterogeneous local
      evidence -- analytical, pymdp, and Lean fragments -- is layered and bound section by
      section, the constructive mechanism by which the multi-track active-inference and
      on-policy-distillation argument is glued into a single coherent document.
    width: 0.98
  invariant_dashboard:
    filename: invariant_dashboard.png
    alt: >-
      Horizontal bar checklist of analytical and simulation invariant names with pass or fail
      status. {{invariants_passed}} of {{invariants_total}} checks pass on the merged report.
    caption: >-
      Invariant dashboard summarizing pass/fail status for every analytical and simulation
      check in the validation registry: {{invariants_passed}} of {{invariants_total}} merged
      checks pass on the combined report. These invariants are the machine-enforced
      correctness conditions -- conservation of probability mass, divergence non-negativity,
      free-energy bounds, and rollout consistency -- that bind the toy
      on-policy-distillation claims to the active-inference math. An all-green dashboard
      means the registered analytical and simulation invariants pass for the generated
      toy artifacts.
    width: 0.9
  tmaze_schematic:
    filename: tmaze_schematic.png
    alt: >-
      Schematic of pymdp's full TMaze generative process with five locations/actions,
      two reward-location states, three observation modalities, and SI search horizon
      {{si_tmaze_planning_horizon}}.
    caption: >-
      Schematic of pymdp's full TMaze generative process: {{si_tmaze_location_state_count}}
      location states/actions, {{si_tmaze_reward_location_state_count}} reward-location
      states, three observation modalities, cue validity {{si_tmaze_cue_validity}}, and SI
      search horizon {{si_tmaze_planning_horizon}}. The diagram lays out the hidden states,
      observations, and controllable transitions that define the teacher's task, including
      the cue arm whose validity determines how informative the epistemic action is. It fixes
      the world model in which the active-inference teacher is computed and, in turn, the
      task structure an on-policy student must operate within to be distilled faithfully.
    width: 0.85
  si_tmaze_model_matrices:
    filename: si_tmaze_model_matrices.png
    alt: >-
      Matrix summary figure for the pymdp full TMaze model. Left panel lists labeled
      A and B factors, shapes, and dependencies; right panel shows A, B, and D
      normalization checks around unit probability mass.
    caption: >-
      Full TMaze generative-model matrix and value audit. Left: the labeled A (likelihood)
      and B (transition) factors with shapes {{si_tmaze_matrix_shape_summary}} and their
      state dependencies, alongside C preferences and D priors. Right: A, B, and D
      normalization checks confirming each conditional distribution sums to unit probability
      mass (from `output/data/si_tmaze_model_matrices.json`). The audit exposes the exact
      parameters that generate the teacher's behavior and verifies they are valid
      probabilities, so the active-inference policy being distilled rests on a well-formed
      generative model rather than an unchecked numerical artifact.
    width: 0.92
  classroom_distillation_signal:
    filename: classroom_distillation_signal.png
    alt: >-
      Two-panel classroom distillation figure. The left panel plots per-step
      reverse KL, forward KL, and Jensen-Shannon divergence between the privileged
      teacher and on-policy student policies. The right panel is a heatmap of
      teacher probability minus student probability by action and classroom step.
    caption: >-
      Two-agent classroom distillation signal over {{classroom_step_count}} decision points
      (3 transitions) between a privileged teacher (cue validity
      {{classroom_teacher_cue_validity}}) and an on-policy student (cue validity
      {{classroom_student_cue_validity}}). Left: per-step reverse KL, forward KL, and
      Jensen-Shannon divergence between the teacher and student policies (mean reverse KL
      {{classroom_mean_reverse_kl_formatted}} nats, mean Jensen-Shannon
      {{classroom_mean_jensen_shannon:.3f}} nats, {{classroom_agreement_count}} agreement
      rows). Right: a heatmap of teacher-minus-student action probability by action and
      step, localizing where the student diverges. The figure operationalizes on-policy
      distillation as a per-step divergence signal evaluated along the student's own
      trajectory, the same active-inference principle of scoring beliefs on visited states
      rather than the teacher's idealized path.
    width: 0.94
  multi_track_architecture:
    filename: multi_track_architecture.png
    alt: >-
      Evidence architecture diagram with three horizontal lanes for the analytical
      Bernoulli-Ising model, the on-policy pymdp T-maze, and the formal/sheaf publication
      spine. Each lane maps source artifacts to auto-injected manuscript variables,
      validation gates, and reader-facing figures or supplement sections.
    caption: >-
      Evidence architecture for the manuscript. Each scientific lane exposes the complete
      chain from source artifacts to injected variables, validation gates, and reader-facing
      outputs: the analytical lane carries the mutual-information and free-energy gap
      values; the pymdp lane carries cue timing and policy-entropy diagnostics; the formal
      lane carries Lean theorem extraction, sheaf-law verification, figure provenance, and
      supplemental material. The bottom spine shows the deterministic publication sequence
      from analysis through release, with {{token_provenance_count}} injected manuscript
      tokens, {{validation_gate_index_count}} validation gates, and
      {{hardcoded_variable_issue_count}} hard-coded variable issues in the generated audit.
    width: 0.95
  lean_boundary_status:
    filename: lean_boundary_status.png
    alt: >-
      Table figure listing Lean modules, declaration kinds, names, and proved versus sorry status
      under lean/OnPolicyDistillation/.
    caption: >-
      Lean formalization boundary: a table of modules, declaration kinds, names, and
      proved-versus-sorry status under `lean/OnPolicyDistillation/`, each row a witness
      checked by `lake build`. Proved rows mark the finite boundary claims in this inventory
      that are machine-verified, while any sorry row honestly demarcates the edge of what is
      formally established. The figure makes the trust boundary explicit: the compiled core is
      the declared finite witness set, not a general proof about all OPD or active-inference
      systems.
    width: 0.9
  gnn_ontology_concordance:
    filename: gnn_ontology_concordance.png
    alt: >-
      Layered concordance diagram linking analytical symbols, GNN variables from
      bernoulli_toy.gnn.md ({{gnn_spec_version}}), and Active Inference Ontology terms.
    caption: >-
      Concordance diagram aligning the analytical symbols of the Bernoulli--Ising toy with the
      generative-model variables declared in `bernoulli_toy.gnn.md` ({{gnn_spec_version}}) and
      their corresponding Active Inference Ontology terms. The three-layer mapping covers all
      {{bernoulli_ontology_term_count}} expected variable--term pairs and checks
      that the equations in the manuscript, the executable GNN specification, and the shared
      ontology vocabulary use the same declared names. This naming concordance keeps
      the on-policy-distillation toy aligned with a GNN/ontology-scoped active-inference
      specification rather than relying on a loose analogy.
    width: 0.9
  semantic_gluing_graph:
    filename: semantic_gluing_graph.png
    alt: >-
      Dependency diagram linking configured analysis scripts to generated evidence
      artifacts, manuscript consumers, and validation gates for the semantic sheaf
      gluing certificate.
    caption: >-
      Semantic gluing graph tracing the dependency chain from configured analysis scripts
      (producers) through the generated evidence artifacts to the manuscript consumers and
      validation gates that close the multi-track sheaf certificate. Each edge records a
      declared provenance link, so the graph is the auditable trail showing that registered
      figure and variable dependencies are traced to declared producers and re-checked
      downstream. It is the operational embodiment of the sheaf gluing condition for this
      artifact contract: producers, artifacts, and consumers must agree along the registered
      edges before the assembled active-inference / on-policy-distillation argument is accepted.
      Long consumer lists are visually compacted with `+N` counts while remaining bound to
      `output/data/validation_dependency_graph.json`.
    width: 0.95
  theorem_traceability_graph:
    filename: theorem_traceability_graph.png
    alt: >-
      Three-column graph generated from theorem traceability and proof dependency JSON.
      Each row links a Lean theorem to its proof-dependency edge count and finite
      model witness count; all theorem rows have resolved dependency edges:
      {{proof_dependency_all_resolved}}.
    caption: >-
      Theorem traceability graph generated from {{theorem_traceability_row_count}} linked
      theorem rows and {{proof_dependency_edge_count}} proof-dependency edges; all
      {{theorem_traceability_row_count}} theorem rows are drawn, each carrying the same
      finite-witness count (collapsed into a single annotation), and all theorem rows have
      resolved dependency edges: {{proof_dependency_all_resolved}}. The graph exposes the
      deductive backbone of the formal track -- which lemmas each
      distillation/active-inference theorem rests on and which finite models witness it.
      Fully resolved dependencies show that each declared finite theorem row has a registered
      proof-dependency chain rather than appearing as an isolated assertion; they do not close
      formal obligations outside this inventory.
    width: 0.95
  causal_ablation_heatmap:
    filename: causal_ablation_heatmap.png
    alt: >-
      Heatmap generated from the causal ablation and sensitivity reports. Rows are
      toy graph topologies, columns are perturbation types, and each cell shows the
      maximum absolute deterministic effect sourced from generated JSON rows.
    caption: >-
      Causal-ablation heatmap over {{ablation_sensitivity_row_count}} source-backed rows
      joined to the sensitivity and uncertainty artifacts (all effects source-backed:
      {{ablation_sensitivity_source_backed}}). This heatmap is an aggregated max-effect
      view of the {{ablation_sensitivity_row_count}} source rows: rows are toy graph
      topologies, columns are perturbation types, and each cell reports the maximum
      absolute deterministic effect of that intervention. The map shows which structural
      assumptions of the generative model the distillation outcome is sensitive to and
      which it is robust against inside this toy intervention matrix, flagging where the
      generated on-policy behavior would shift under declared model misspecification without
      asserting deployment-scale effects.
    width: 0.92
  scholarship_source_map:
    filename: scholarship_source_map.png
    alt: >-
      Condensed source map generated from the scholarship source matrix. The left panel
      shows the highest-count source families plus an aggregated long-tail row, the middle
      panel shows where those families bind into generated artifact buckets, and the right
      panel summarizes source kinds.
    caption: >-
      Condensed scholarship source map for {{scholarship_source_count}} bibliography source
      rows across {{scholarship_method_role_count}} method roles and
      {{scholarship_source_family_count}} source families (connected status:
      {{scholarship_sources_connected}}). The rendered figure is intentionally print-condensed:
      it shows the largest source
      families plus an aggregated long-tail row, where those families bind into generated
      artifact buckets, and the distribution of source kinds; the full row-level contract
      remains in `output/data/scholarship_source_matrix.json`. The map ties each external
      reference -- on-policy distillation and active-inference literature alike -- to a
      concrete place where the exemplar uses or tests it, evidencing load-bearing
      scholarship rather than decorative citation.
    width: 0.95
  graphical_abstract:
    filename: graphical_abstract.png
    alt: >-
      Near-square cover-page graphical abstract for the Active Inference multi-track
      exemplar. A central correspondence loop links the privileged teacher generative
      model, student posterior, student-generated rollouts, and gate-checked publication
      object. Four large evidence quadrants report the analytical oracle, on-policy rollout
      diagnostics, variational/expected-free-energy accounting, and Lean/sheaf validation
      discipline.
    caption: >-
      Near-square graphical abstract for the toy/artifact exemplar. The central evidence
      wheel reads the active-inference / on-policy-distillation correspondence as a
      privileged teacher generative model, a student posterior, student-generated
      observations, and a validated publication object. The four surrounding quadrants pull
      live quantities from the analytical oracle, pymdp/classroom rollout artifacts, the
      first-principles energy decomposition, and Lean/sheaf validation gates, so the cover
      image is generated from repository artifacts rather than drawn as narrative
      decoration.
    width: 0.96

