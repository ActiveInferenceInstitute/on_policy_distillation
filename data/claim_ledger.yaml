claims:
- id: sheaf_registry
  statement: Sheaf track registry is present and drives compose order.
  path: manuscript/sheaf/tracks.yaml
  section: methods_sheaf
  tracks:
  - manuscript
  - sheaf
  evidence:
    field: tracks
    predicate: non_empty
  waiver: Presence/non-empty check is intentionally shallow here; the registry's
    full track schema and compose-order semantics are validated by the sheaf
    manifest/coverage gates, which fail closed on malformed track definitions.
- id: sheaf_manifest
  statement: IMRAD section manifest binds track fragments for composition.
  path: manuscript/sheaf/manifest.yaml
  section: methods_sheaf
  tracks:
  - manuscript
  - sheaf
  evidence:
    field: sections
    predicate: non_empty
  waiver: Presence/non-empty check is intentionally shallow here; the manifest's
    IMRAD section-to-fragment bindings are fully validated by the sheaf manifest
    loader and composition gates, which fail closed on malformed bindings.
- id: sheaf_coverage_config
  statement: Coverage report and heatmap settings are configurable.
  path: manuscript/sheaf/coverage.yaml
  section: sheaf_coverage
  tracks:
  - manuscript
  - visualization
  evidence:
    field: heatmap
    predicate: non_empty
  waiver: Presence/non-empty check is intentionally shallow here; the coverage
    config's heatmap settings are consumed and validated by the coverage-matrix
    and heatmap-render gates, which fail closed on malformed settings.
- id: sheaf_coverage_matrix
  statement: Coverage matrix JSON reflects manifest track bindings with IMRAD metadata.
  path: output/data/sheaf_coverage_matrix.json
  section: sheaf_coverage
  tracks:
  - manuscript
  - sheaf
  evidence:
    field: sections
    predicate: non_empty
  waiver: Non-empty field check is intentionally shallow here; the coverage
    matrix's full IMRAD metadata and gray-cell count are re-derived by the
    coverage_no_gray claim and validate_coverage_json_data, which fail closed.
- id: sheaf_gluing_certificate
